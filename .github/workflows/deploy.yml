name: Deploy Doctor Portal

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: devixx/carepoint-front
  SERVICE_NAME: doctor-portal

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN_NAME }}/api
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  restart-service:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Caddyfile to GCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_IP }}
          username: ubuntu
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "Caddyfile"
          target: "/home/ubuntu/carepoint/"

      - name: Pull, restart service, and reload Caddy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_IP }}
          username: ubuntu
          key: ${{ secrets.GCP_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/ubuntu/carepoint

            if [ ! -f docker-compose.yaml ]; then
              echo "docker-compose.yaml not found on the VM."
              exit 1
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            sudo docker compose pull doctor-portal
            sudo docker compose up -d --no-deps doctor-portal

            sudo docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile
